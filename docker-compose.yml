services:
  mongo:
    image: mongo:latest
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongo
    networks:
      - app-network

  # Microsoft SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      # SA password: min 8 chars, upper, lower, number, symbol (SQL Server policy)
      MSSQL_SA_PASSWORD: "YourStrongPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    # Health check for SQL Server.
    # Compose marks this service as "healthy" only after SQL accepts a simple query
    # (or, as a fallback, after port 1433 is reachable). Because `todo-api` uses
    # `depends_on: condition: service_healthy`, Docker will not start the TodoApi
    # container until this check passes.
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\"; else bash -c '</dev/tcp/localhost/1433'; fi",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    # Apple Silicon: uncomment if the image fails to start (emulates x86_64)
    platform: linux/amd64

  # Web UI for SQL Server (create DBs, run queries). First run: open UI → create admin → New connection.
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    depends_on:
      - sqlserver
    networks:
      - app-network

  # TodoApi — containerised ASP.NET Core service
  # ConnectionStrings__TodoContext overrides appsettings.json at runtime.
  # "Server=sqlserver,1433" uses the compose service name as the hostname.
  # This local container path is HTTP-only; HTTPS should be terminated later by a
  # reverse proxy such as nginx rather than inside the app container.
  todo-api:
    build:
      context: ../TodoApi
      dockerfile: Dockerfile
    container_name: todo-api
    restart: unless-stopped
    ports:
      - "5188:8080"    # http://localhost:5188
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TodoContext: "Server=sqlserver,1433;Database=TodoApi;User Id=sa;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      RabbitMQ__HostName: rabbitmq
    depends_on:
      # Wait for SQL Server to be healthy before starting — migrations run on startup.
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # HousingApi — containerised ASP.NET Core service (Mongo-backed)
  # HousingDatabase__ConnectionString overrides the nested appsettings.json key at runtime.
  # "mongo:27017" uses the compose service name as the hostname.
  # HTTP-only locally; HTTPS is a reverse proxy concern.
  housing-api:
    build:
      context: ../HousingApi
      dockerfile: Dockerfile
    container_name: housing-api
    restart: unless-stopped
    ports:
      - "7152:8080"    # http://localhost:7152
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      HousingDatabase__ConnectionString: "mongodb://admin:password123@mongo:27017/?authSource=admin"
      RabbitMQ__HostName: rabbitmq
    depends_on:
      mongo:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - app-network

  # RabbitMQ message broker + management UI
  # AMQP port 5672: .NET services connect here to publish/consume messages
  # Management UI port 15672: http://localhost:15672 (login: admin / admin)
  rabbitmq:
    image: rabbitmq:4-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongo_data:
  sqlserver_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge


